<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0B3D2E"/>
  <!-- 5R ring: 5 arcs in the 5R colors -->
  <g fill="none" stroke-width="5" stroke-linecap="round">
    <circle cx="32" cy="32" r="24" stroke="#1E7A5A" stroke-dasharray="28 122.7"/>
    <circle cx="32" cy="32" r="24" stroke="#2D7DD2" stroke-dasharray="28 122.7" stroke-dashoffset="-30.2"/>
    <circle cx="32" cy="32" r="24" stroke="#16A085" stroke-dasharray="28 122.7" stroke-dashoffset="-60.4"/>
    <circle cx="32" cy="32" r="24" stroke="#8E44AD" stroke-dasharray="28 122.7" stroke-dashoffset="-90.6"/>
    <circle cx="32" cy="32" r="24" stroke="#E8A317" stroke-dasharray="28 122.7" stroke-dashoffset="-120.8"/>
  </g>
  <text x="32" y="33" font-family="Archivo, Arial, sans-serif" font-weight="800" font-size="26" fill="#fff" text-anchor="middle" dominant-baseline="central" letter-spacing="-1">5R</text>
</svg>
